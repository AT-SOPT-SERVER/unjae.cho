name: Docker Image CI/CD

on:
  push:
    branches: [ "deploy" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source code
      - name: Checkout source
        uses: actions/checkout@v4

      # Step 2: Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Grant execute permission for Gradle wrapper
      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      # Step 4: Build the application with Gradle
      - name: Build with Gradle
        run: ./gradlew build

      # Step 5: Build Docker image
      - name: Build Docker image
        run: docker build -t my-image-name:latest .

      # Step 6: SSH into NCP server and deploy the Docker image
      - name: SSH and deploy Docker container on NCP
        env:
          NCP_USER: ${{ secrets.NCP_USER }}
          NCP_HOST: ${{ secrets.NCP_HOST }}
          NCP_KEY: ${{ secrets.NCP_KEY }}
        run: |
          # Add SSH key to ssh-agent
          echo "$NCP_KEY" > /tmp/id_rsa
          chmod 600 /tmp/id_rsa
          eval "$(ssh-agent -s)"
          ssh-add /tmp/id_rsa

          # SSH into NCP and deploy Docker container
          ssh -o StrictHostKeyChecking=no -i /tmp/id_rsa $NCP_USER@$NCP_HOST << EOF
            # Pull the latest Docker image (if needed)
            docker pull my-image-name:latest
            # Run the Docker container on NCP
            docker stop my-app || true
            docker rm my-app || true
            docker run -d -p 8080:8080 --name my-app my-image-name:latest
          EOF
