name: Docker Image CI/CD

on:
  push:
    branches: ["deploy"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout source
        uses: actions/checkout@v4

      # Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Grant execute permission for Gradle wrapper
      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      # Build the project with Gradle
      - name: Build with Gradle
        run: ./gradlew build

      # Build Docker image
      - name: Build Docker image
        run: docker build . --file Dockerfile --tag my-image-name:latest

      # Deploy to NCP via SSH
      - name: Deploy to NCP and Run Docker Container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.NCP_HOST }}
          username: root
          key: ${{ secrets.NCP_KEY }}
          script: |
            # Stop and remove the existing container if running
            docker stop my-app || true
            docker rm my-app || true

            # Optionally, remove the old image
            docker rmi my-image-name:latest || true

            # Navigate to the directory (if needed) and pull the latest code
            cd /root/my-app-directory || true
            git pull origin deploy || true

            # Rebuild the Docker image if necessary
            docker build -t my-image-name:latest .

            # Run the Docker container in detached mode
            docker run -d --name my-app -p 8080:8080 my-image-name:latest
