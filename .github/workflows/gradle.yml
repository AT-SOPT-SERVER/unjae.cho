name: Spring Boot Deploy to NCP

on:
  push:
    branches: [ "deploy" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.NCP_KEY }}

      - name: Add known hosts
        run: |
          ssh-keyscan -H ${{ secrets.NCP_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          scp -i ${{ secrets.NCP_KEY }} build/libs/*.jar ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }}:/root/unjae.cho/app.jar

      - name: Restart Spring Boot Application
        run: |
          ssh ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} << 'EOF'
            pkill -f 'java -jar'
          
            nohup java -jar /root/unjae.cho/app.jar > nohup.out 2>&1 &
          EOF