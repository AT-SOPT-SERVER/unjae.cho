name: CI/CD Pipeline

on:
  push:
    branches:
      - main  # main 브랜치에 푸시될 때마다 실행

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up JDK
        uses: actions/setup-java@v2
        with:
          java-version: '17'

      - name: Build with Gradle
        run: ./gradlew build

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.NCP_KEY }}

      - name: Add known hosts
        run: |
          ssh-keyscan -H ${{ secrets.NCP_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          scp build/libs/*.jar ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }}:/root/unjae.cho/app.jar

      - name: Restart Spring Boot Application
        run: |
          ssh ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} << 'EOF'
            # 기존 서버 종료
            pkill -f 'java -jar'
          
            # 새로운 애플리케이션 실행
            nohup java -jar /root/unjae.cho/app.jar > nohup.out 2>&1 &
          EOF
