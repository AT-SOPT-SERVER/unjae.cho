name: Java CI/CD with Gradle

on:
  push:
    branches: [ "deploy" ]
  pull_request:
    branches: [ "deploy" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle Wrapper
        run: ./gradlew build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: assignment-jar
          path: build/libs/assignment-0.0.1-SNAPSHOT.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: assignment-jar
          path: ./build/libs/


      - name: Add EC2 server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.NCP_HOST }} >> ~/.ssh/known_hosts

      - name: Create PEM Key File
        run: |
          echo "${{ secrets.NCP_KEY }}" > sopt-test.pem
          chmod 600 sopt-test.pem

      - name: Deploy to NCP
        run: |
          ssh -i sopt-test.pem ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} "java -jar /root/unjae.cho/build/libs/assignment-0.0.1-SNAPSHOT.jar &"

      - name: Verify Deployment
        run: |
          ssh -i sopt-test.pem ${{ secrets.NCP_USER }}@${{ secrets.NCP_HOST }} "ps aux | grep assignment-0.0.1-SNAPSHOT.jar"
