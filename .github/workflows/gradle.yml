name: CI/CD with Docker

on:
  push:
    branches:
      - deploy


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle Wrapper
        run: ./gradlew build

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t soptjae/spring-server:latest .

      - name: Push Docker image to Docker Hub
        run: |
          docker push soptjae/spring-server:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to remote server
        run: |
          ssh -i sopt-test.pem -o StrictHostKeyChecking=no root@211.188.60.209 "
            docker pull soptjae/spring-server:latest &&
            docker stop spring-server || true &&
            docker rm spring-server || true &&
            docker run -d -p 8080:8080 --name spring-server soptjae/spring-server:latest
          "
