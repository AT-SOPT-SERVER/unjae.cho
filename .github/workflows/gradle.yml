name: Spring Boot Deploy to NCP

on:
  push:
    branches: [ "deploy" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.NCP_SSH_KEY }}

      - name: Copy jar to server
        run: |
          scp build/libs/*.jar ${{ secrets.NCP_SERVER_USER }}@${{ secrets.NCP_SERVER_HOST }}:/home/deploy/unjae/app.jar

      - name: Remote SSH - Restart app
        run: |
          ssh ${{ secrets.NCP_SERVER_USER }}@${{ secrets.NCP_SERVER_HOST }} << 'EOF'
            if [ -f /unjae.cho/app.pid ]; then
              kill -9 $(cat /unjae.cho/app.pid) || true
            fi
          
            nohup java -jar /home/deploy/unjae/app.jar > /home/deploy/unjae/nohup.out 2>&1 &
          
            echo $! > /home/deploy/unjae/app.pid
          EOF
